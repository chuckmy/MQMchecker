<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MQM翻訳チェッカー</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #18202a;
      --muted: #5d6775;
      --accent: #0b6bcb;
      --border: #d8deea;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .text-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #e7eef8;
      color: #0f375f;
    }

    .secondary:disabled,
    .primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      min-height: 24px;
    }

    .error {
      color: var(--danger);
    }

    .summary-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fbfcff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      white-space: pre-wrap;
    }

    .empty {
      color: var(--muted);
    }

    pre {
      white-space: pre-wrap;
      background: #fbfcff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin: 0;
    }

    @media (max-width: 800px) {
      .text-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MQM翻訳チェッカー</h1>
    <p class="lead">社内文書向けの簡易MQMレビュー。APIキーはバックエンドの `.env` だけで管理します。</p>

    <section class="card">
      <div class="grid">
        <div>
          <label for="purpose">purpose</label>
          <input id="purpose" value="社内情報共有" />
        </div>
        <div>
          <label for="audience">audience</label>
          <input id="audience" value="ITエンジニア" />
        </div>
        <div>
          <label for="tone">tone</label>
          <input id="tone" value="自然で明確" />
        </div>
        <div>
          <label for="terminology_policy">terminology_policy</label>
          <input id="terminology_policy" value="特になし" />
        </div>
        <div>
          <label for="priority">priority</label>
          <input id="priority" value="内容把握とAccuracy重視" />
        </div>
      </div>

      <div class="text-grid" style="margin-top: 14px;">
        <div>
          <label for="source_text">source_text</label>
          <textarea id="source_text" placeholder="原文を入力してください"></textarea>
        </div>
        <div>
          <label for="target_text">target_text</label>
          <textarea id="target_text" placeholder="訳文を入力してください"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="reviewButton" class="primary">チェック実行</button>
        <button id="csvButton" class="secondary">CSVダウンロード</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="card">
      <h2>Summary</h2>
      <div id="summary" class="empty">まだ結果がありません。</div>
    </section>

    <section class="card">
      <h2>Issues</h2>
      <div id="issues" class="empty">まだ結果がありません。</div>
    </section>

    <section class="card">
      <h2>Revised Translation</h2>
      <div id="revised_translation" class="empty">まだ結果がありません。</div>
    </section>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    let latestPayload = null;

    function getAuthHeader() {
      let token = sessionStorage.getItem("mqm_auth");
      if (!token) {
        const user = window.prompt("ユーザー名を入力してください");
        if (user === null) return null;
        const pass = window.prompt("パスワードを入力してください");
        if (pass === null) return null;
        token = btoa(unescape(encodeURIComponent(`${user}:${pass}`)));
        sessionStorage.setItem("mqm_auth", token);
      }
      return `Basic ${token}`;
    }

    function clearAuth() {
      sessionStorage.removeItem("mqm_auth");
    }

    function getPayload() {
      return {
        purpose: document.getElementById("purpose").value.trim() || "社内情報共有",
        audience: document.getElementById("audience").value.trim() || "ITエンジニア",
        tone: document.getElementById("tone").value.trim() || "自然で明確",
        terminology_policy: document.getElementById("terminology_policy").value.trim() || "特になし",
        priority: document.getElementById("priority").value.trim() || "内容把握とAccuracy重視",
        source_text: document.getElementById("source_text").value.trim(),
        target_text: document.getElementById("target_text").value.trim()
      };
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = isError ? "status error" : "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderSummary(result) {
      const summary = result.summary || {};
      const assumptions = result.assumptions || {};
      document.getElementById("summary").innerHTML = `
        <div class="summary-box">
          <div class="summary-item"><strong>Overall</strong><br>${escapeHtml(summary.overall || "")}</div>
          <div class="summary-item"><strong>Critical</strong><br>${escapeHtml(summary.critical_count ?? 0)}</div>
          <div class="summary-item"><strong>Major</strong><br>${escapeHtml(summary.major_count ?? 0)}</div>
          <div class="summary-item"><strong>Minor</strong><br>${escapeHtml(summary.minor_count ?? 0)}</div>
          <div class="summary-item"><strong>Top Priority</strong><br>${escapeHtml(summary.top_priority || "")}</div>
        </div>
        <pre>${escapeHtml(JSON.stringify(assumptions, null, 2))}</pre>
      `;
    }

    function renderIssues(result) {
      const issues = result.issues || [];
      if (!issues.length) {
        document.getElementById("issues").innerHTML = '<div class="empty">問題は検出されませんでした。</div>';
        return;
      }

      const rows = issues.map((issue) => `
        <tr>
          <td>${escapeHtml(issue.source_span)}</td>
          <td>${escapeHtml(issue.target_span)}</td>
          <td>${escapeHtml(issue.mqm_category)}</td>
          <td>${escapeHtml(issue.sub_category)}</td>
          <td>${escapeHtml(issue.severity)}</td>
          <td>${escapeHtml(issue.reason)}</td>
          <td>${escapeHtml(issue.suggestion)}</td>
        </tr>
      `).join("");

      document.getElementById("issues").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>原文箇所</th>
              <th>訳文箇所</th>
              <th>MQM分類</th>
              <th>詳細カテゴリ</th>
              <th>重大度</th>
              <th>理由</th>
              <th>修正案</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderRevisedTranslation(result) {
      const revised = result.revised_translation || "";
      document.getElementById("revised_translation").innerHTML = revised
        ? `<pre>${escapeHtml(revised)}</pre>`
        : '<div class="empty">結果がありません。</div>';
    }

    async function postJson(path, payload) {
      const auth = getAuthHeader();
      if (!auth) throw new Error("認証がキャンセルされました。");

      const response = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": auth
        },
        body: JSON.stringify(payload)
      });

      if (response.status === 401) {
        clearAuth();
        throw new Error("認証に失敗しました。再度実行してください。");
      }

      if (!response.ok) {
        let message = `HTTP ${response.status}`;
        try {
          const errorData = await response.json();
          message = errorData.detail || message;
        } catch (_) {
          // Ignore parse failure and keep the default message.
        }
        throw new Error(message);
      }

      return response;
    }

    document.getElementById("reviewButton").addEventListener("click", async () => {
      const payload = getPayload();
      if (!payload.source_text || !payload.target_text) {
        setStatus("原文と訳文の両方を入力してください。", true);
        return;
      }

      latestPayload = payload;
      setStatus("レビューを実行中です...");

      try {
        const response = await postJson("/review", payload);
        const result = await response.json();
        renderSummary(result);
        renderIssues(result);
        renderRevisedTranslation(result);
        setStatus("レビューが完了しました。");
      } catch (error) {
        setStatus(`エラー: ${error.message}`, true);
      }
    });

    document.getElementById("csvButton").addEventListener("click", async () => {
      const payload = latestPayload || getPayload();
      if (!payload.source_text || !payload.target_text) {
        setStatus("CSV出力前に原文と訳文の両方を入力してください。", true);
        return;
      }

      setStatus("CSVを生成しています...");

      try {
        const response = await postJson("/review/csv", payload);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "mqm_review.csv";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("CSVをダウンロードしました。");
      } catch (error) {
        setStatus(`エラー: ${error.message}`, true);
      }
    });
  </script>
</body>
</html>
